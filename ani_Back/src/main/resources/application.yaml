spring:
  application:
    name: animal
  datasource:
    url: jdbc:h2:mem:animal;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.hibernate.SQL: debug

# 파일 업로드 경로(이미지 파일)
# 전부 호환되는 파일경로
file: 
  path: ${user.dir}/uploads/image